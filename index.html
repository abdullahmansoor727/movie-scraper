<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px; background: #000;
}
#loader-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: opacity .6s ease; opacity: 0;
}
.spinner {
  position: relative; z-index: 1;
  width: 72px; height: 72px;
  border: 5px solid rgba(255,255,255,.15);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { position: relative; z-index: 1; font-size: .95rem; color: rgba(255,255,255,.6); letter-spacing: .04em; text-shadow: 0 1px 4px #000; }

#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; }
#stream-actions {
  position: fixed; top: 12px; right: 12px; z-index: 5;
  display: none; gap: 8px;
}
.stream-btn {
  min-width: 88px; min-height: 36px; padding: 0 12px;
  border: 1px solid rgba(255,255,255,.28); border-radius: 6px;
  background: rgba(0,0,0,.68); color: #fff; font: inherit;
  font-size: .82rem; cursor: pointer; backdrop-filter: blur(10px);
}
.stream-btn:hover { background: rgba(255,255,255,.14); }
.stream-btn:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; }
#copy-status {
  position: fixed; top: 56px; right: 12px; z-index: 6;
  max-width: min(360px, calc(100vw - 24px)); padding: 9px 11px;
  border: 1px solid rgba(255,255,255,.18); border-radius: 6px;
  background: rgba(0,0,0,.78); color: rgba(255,255,255,.9);
  font-size: .8rem; opacity: 0; pointer-events: none;
  transition: opacity .18s ease; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
}
#copy-status.visible { opacity: 1; }
@media (max-width: 600px) {
  #stream-actions { left: 12px; right: 12px; }
  .stream-btn { flex: 1; }
  #copy-status { left: 12px; right: 12px; }
}

#usage {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  background: #000; gap: 10px;
}
#usage p { font-size: 1.05rem; color: rgba(255,255,255,.65); line-height: 2; }

#err {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; background: #000;
}
#err-title { font-size: 2.4rem; font-weight: 700; color: #fff; margin-bottom: 18px; }
#err-link { font-size: 1.1rem; color: #60a5fa; text-decoration: underline; cursor: pointer; }
#err-link:hover { color: #93c5fd; }
#err-detail {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-size: .78rem; color: rgba(255,255,255,.35); white-space: nowrap;
  max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p>
    <span style="color:#fff;font-size:1.2rem">Stream</span><br><br>
    <code style="color:rgba(255,255,255,.8)">?id=550</code> &nbsp;— movie<br>
    <code style="color:rgba(255,255,255,.8)">?id=456&amp;s=1&amp;e=1</code> &nbsp;— TV episode
  </p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try vidsrc.xyz instead?</a>
  <div id="err-detail"></div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline></video>
</div>

<div id="stream-actions" aria-label="Stream actions">
  <button id="copy-hls" class="stream-btn" type="button" title="Copy proxied HLS playlist URL">HLS URL</button>
</div>
<div id="copy-status" role="status" aria-live="polite"></div>

<script>
var TMDB_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';

var MESSAGES = [
  'Loading stream...', 'Contacting the mothership...', 'Bribing the servers...',
  'Untangling the cables...', 'Asking nicely...', 'Decoding the matrix...',
  'Warming up the hamsters...', 'Negotiating with the cloud...', 'Almost there...',
  'Convincing pixels to move...', 'Poking the API...', 'Summoning bandwidth...',
  'Greasing the pipes...', 'Waking up the interns...', 'Stealing the stream (legally)...'
];
var msgEl = document.getElementById('loader-text');
var msgIdx = 0;
var msgTimer = setInterval(function() {
  msgIdx = (msgIdx + 1) % MESSAGES.length;
  msgEl.textContent = MESSAGES[msgIdx];
}, 2200);

var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');
var currentHlsUrl = '';
var copyStatusTimer = null;

function showPlayer() {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('player').style.display = 'block';
  if (currentHlsUrl) document.getElementById('stream-actions').style.display = 'flex';
}

function showErr(msg) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('stream-actions').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg || '';
  var vidsrcUrl = s
    ? 'https://vidsrc.xyz/embed/tv?tmdb=' + id + '&season=' + s + '&episode=' + (e || '1')
    : 'https://vidsrc.xyz/embed/movie?tmdb=' + id;
  document.getElementById('err-link').href = vidsrcUrl;
}

function loadBackdrop(id, isTv) {
  var type = isTv ? 'tv' : 'movie';
  fetch('https://api.themoviedb.org/3/' + type + '/' + id + '?api_key=' + TMDB_KEY)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var img = d.backdrop_path || d.poster_path;
      if (!img) return;
      var url = 'https://wsrv.nl/?url=' + encodeURIComponent('https://image.tmdb.org/t/p/w1280' + img) + '&bg=black&blur=3';
      var bg = document.getElementById('loader-bg');
      var preload = new Image();
      preload.onload = function() { bg.style.backgroundImage = 'url(' + url + ')'; bg.style.opacity = '1'; };
      preload.src = url;
    })
    .catch(function() {});
}

function setHlsHelper(rawUrl) {
  var proxiedPath = '/api/playlist.m3u8?url=' + encodeURIComponent(rawUrl);
  currentHlsUrl = new URL(proxiedPath, location.href).href;
}

function showCopyStatus(message) {
  var el = document.getElementById('copy-status');
  el.textContent = message;
  el.classList.add('visible');
  clearTimeout(copyStatusTimer);
  copyStatusTimer = setTimeout(function() {
    el.classList.remove('visible');
  }, 2200);
}

function fallbackCopy(text, onDone, onFail) {
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.setAttribute('readonly', '');
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy') ? onDone() : onFail();
  } catch (err) {
    onFail();
  }
  document.body.removeChild(textarea);
}

function copyText(text, message) {
  if (!text) return showCopyStatus('Stream is not ready');
  var done = function() { showCopyStatus(message); };
  var fail = function() { showCopyStatus('Copy failed'); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(function() {
      fallbackCopy(text, done, fail);
    });
  } else {
    fallbackCopy(text, done, fail);
  }
}

document.getElementById('copy-hls').addEventListener('click', function() {
  copyText(currentHlsUrl, 'HLS URL copied');
});

if (!id) {
  clearInterval(msgTimer);
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  loadBackdrop(id, !!s);
  var api = '/api?' + (s ? 'id='+id+'&s='+s+'&e='+(e||'1') : 'id='+id);
  fetch(api)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) return showErr(d.error);
      setHlsHelper(d.url);
      play(d.url);
    })
    .catch(function(err) { showErr(err.message); });
}

function play(rawUrl) {
  var src = '/api/playlist.m3u8?url=' + encodeURIComponent(rawUrl);
  var v = document.getElementById('v');
  if (Hls.isSupported()) {
    var hls = new Hls({ enableWorker: true });
    hls.loadSource(src);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      showPlayer();
      v.play().catch(function(){});
    });
    hls.on(Hls.Events.ERROR, function(_, d) {
      if (d.fatal) showErr(d.details || 'HLS fatal error');
    });
  } else {
    v.src = src;
    v.addEventListener('canplay', showPlayer, { once: true });
    v.play().catch(function(err) { showErr(err.message); });
  }
}
</script>
</body>
</html>
